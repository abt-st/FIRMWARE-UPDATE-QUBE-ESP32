; ──────────────────────────────────────────────────────────────────────────────
;  PlatformIO Configuration — QUBE Servo ESP32
;  Build: pio run
;  Upload: pio run --target upload
;  Monitor: pio device monitor
; ──────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ── Monitor serial ──────────────────────────────────────────────────────────
monitor_speed = 115200

; ── Upload settings ─────────────────────────────────────────────────────────
upload_speed = 921600

; ── Dependencies ────────────────────────────────────────────────────────────
lib_deps = 
    adafruit/Adafruit INA219 @ ^1.2.0

; ── Build flags ─────────────────────────────────────────────────────────────
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── Partition scheme (default 4MB) ──────────────────────────────────────────
board_build.partitions = default.csv

; ── Test configuration ──────────────────────────────────────────────────────
test_filter = 

; ── Linting (clang-tidy) ────────────────────────────────────────────────────
check_tool = clang-tidy
check_flags = 
    --checks=*
    --warnings-as-errors=*

; ── Environment for development ──────────────────────────────────────────────
[env:esp32dev_debug]
extends = env:esp32dev
build_flags = 
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_MODE=1
