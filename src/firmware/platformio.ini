; ──────────────────────────────────────────────────────────────────────────────
;  PlatformIO Configuration — QUBE Servo ESP32
;  Build: pio run
;  Upload: pio run --target upload
;  Monitor: pio device monitor
; ──────────────────────────────────────────────────────────────────────────────

[platformio]
src_dir = esp32_qube_l298n

[env:esp32dev]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino

; ── Monitor serial ──────────────────────────────────────────────────────────
monitor_speed = 115200

; ── Upload settings ─────────────────────────────────────────────────────────
upload_speed = 921600

; ── Dependencies ────────────────────────────────────────────────────────────
lib_deps = 
    wollewald/INA219_WE @ ^1.4.1

; ── Build flags ─────────────────────────────────────────────────────────────
build_flags = 
    -DCORE_DEBUG_LEVEL=3

; ── Partition scheme (default 4MB) ──────────────────────────────────────────
board_build.partitions = default.csv

; ── Test configuration ──────────────────────────────────────────────────────
test_filter = 

; ── Linting (clang-tidy) ────────────────────────────────────────────────────
check_tool = clangtidy
check_flags = 
    --checks=*
    --warnings-as-errors=*

; ── Environment for development ──────────────────────────────────────────────
[env:esp32dev_debug]
extends = env:esp32dev
build_flags = 
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_MODE=1
